# niri-tag-sidebar sample configuration
#
# Each [[panel]] defines a slide-out drawer or progress bar bound to
# a niri gesture tag. The `tag` must match a `tag="..."` property on
# a gesture bind in your niri config — the sidebar subscribes to that
# tag's GestureBegin/Progress/End events and animates accordingly.
#
# This sample is three demos in one:
#   1. Full-edge sidebar drawers (4 panels, one per edge) — typical
#      "swipe in from the edge" drawer UX.
#   2. Progress bar overlays (2 panels) — thin bars that appear during
#      active gestures and show real-time progress. Good for workspace/
#      column navigation feedback.
#   3. Edge-zone drawers (12 panels) — each edge split into three zones,
#      each zone opening its own small drawer. Demonstrates the
#      `TouchEdge edge="..." zone="..."` recognition.
#
# Available settings per panel:
#   tag            - gesture tag to listen for (required)
#   edge           - "left", "right", "top", "bottom" (required)
#   zone           - "full" (default), "start", "center", "end"
#                    For top/bottom: start=left, center=middle, end=right
#                    For left/right: start=top,  center=middle, end=bottom
#   size           - panel size in pixels perpendicular to the edge (default: 300)
#   snap_threshold - 0.0-1.0, progress needed to snap open (default: 0.5)
#   bg_color       - CSS color string (default: "rgba(30, 30, 46, 0.85)")
#   label          - text label shown in the panel (optional)
#   start_open     - true/false (default: false)
#   exclusive_zone - pixels to reserve, 0 = overlay (default: 0)
#   layer          - "overlay" (above bars), "top" (same as bars),
#                    "bottom", "background" (default: "overlay")
#   style          - "drawer" (default, full slide-out) or "bar"
#                    (thin progress indicator that only shows during
#                    active gestures)
#   bar_height     - for style="bar" only: height in pixels (default: 40)

# =============================================================================
# 1. Full-edge sidebar drawers
# =============================================================================
#
# Matching niri config (touchscreen-gestures.kdl or your main binds block):
#
#   Mod+TouchEdge edge="left"   tag="sidebar-left"   { noop; }
#   Mod+TouchEdge edge="right"  tag="sidebar-right"  { noop; }
#   Mod+TouchEdge edge="top"    tag="sidebar-top"    { noop; }
#   Mod+TouchEdge edge="bottom" tag="sidebar-bottom" { noop; }
#
# Pair with any other gesture you like — these are just the conventional
# "edge swipe with Mod held" binds. Drop Mod+ for a plain edge swipe.

[[panel]]
tag = "sidebar-left"
edge = "left"
size = 400
snap_threshold = 0.4
bg_color = "rgba(40, 100, 220, 0.95)"
label = "Navigation"
layer = "overlay"

[[panel]]
tag = "sidebar-right"
edge = "right"
size = 400
snap_threshold = 0.5
bg_color = "rgba(220, 50, 50, 0.95)"
label = "Quick Settings"
layer = "overlay"

[[panel]]
tag = "sidebar-top"
edge = "top"
size = 250
snap_threshold = 0.3
bg_color = "rgba(50, 180, 80, 0.95)"
label = "Notifications"
layer = "overlay"

[[panel]]
tag = "sidebar-bottom"
edge = "bottom"
size = 300
snap_threshold = 0.6
bg_color = "rgba(220, 170, 30, 0.95)"
label = "Media Controls"
layer = "overlay"

# =============================================================================
# 2. Progress bar overlays
# =============================================================================
#
# `style = "bar"` panels are thin progress indicators that only render
# while a gesture is in progress, then auto-hide. They're perfect for
# "what did niri just commit to?" feedback on continuous gestures like
# workspace and column navigation.
#
# Matching niri config — tag the continuous-action binds so the bar
# tracks their progress:
#
#   TouchSwipe    fingers=3 direction="up"    tag="ws-nav"  { focus-workspace-up; }
#   TouchSwipe    fingers=3 direction="down"  tag="ws-nav"  { focus-workspace-down; }
#   TouchSwipe    fingers=3 direction="left"  tag="col-nav" { focus-column-right; }
#   TouchSwipe    fingers=3 direction="right" tag="col-nav" { focus-column-left; }
#
#   TouchpadSwipe fingers=3 direction="up"    tag="ws-nav"  { focus-workspace-up; }
#   TouchpadSwipe fingers=3 direction="down"  tag="ws-nav"  { focus-workspace-down; }
#   TouchpadSwipe fingers=3 direction="left"  tag="col-nav" { focus-column-right; }
#   TouchpadSwipe fingers=3 direction="right" tag="col-nav" { focus-column-left; }

# Progress bar — shows real-time gesture progress for workspace navigation
[[panel]]
tag = "ws-nav"
edge = "bottom"
style = "bar"
bar_height = 40
bg_color = "rgba(100, 60, 200, 0.90)"
label = "Workspace"
layer = "overlay"

# Progress bar — shows real-time gesture progress for column navigation
[[panel]]
tag = "col-nav"
edge = "bottom"
style = "bar"
bar_height = 40
bg_color = "rgba(200, 120, 40, 0.90)"
label = "Column"
layer = "overlay"

# =============================================================================
# 3. Edge-zone drawers — 12 colored panels, one per (edge, zone) pair
# =============================================================================
#
# Each drawer occupies only one third of its edge. Mod+edge-swipe in the
# corresponding zone opens its panel.
#
# Matching niri config:
#
#   Mod+TouchEdge edge="top"    zone="left"   tag="zone-top-left"      { noop; }
#   Mod+TouchEdge edge="top"    zone="center" tag="zone-top-center"    { noop; }
#   Mod+TouchEdge edge="top"    zone="right"  tag="zone-top-right"     { noop; }
#   Mod+TouchEdge edge="bottom" zone="left"   tag="zone-bottom-left"   { noop; }
#   Mod+TouchEdge edge="bottom" zone="center" tag="zone-bottom-center" { noop; }
#   Mod+TouchEdge edge="bottom" zone="right"  tag="zone-bottom-right"  { noop; }
#   Mod+TouchEdge edge="left"   zone="top"    tag="zone-left-top"      { noop; }
#   Mod+TouchEdge edge="left"   zone="center" tag="zone-left-center"   { noop; }
#   Mod+TouchEdge edge="left"   zone="bottom" tag="zone-left-bottom"   { noop; }
#   Mod+TouchEdge edge="right"  zone="top"    tag="zone-right-top"     { noop; }
#   Mod+TouchEdge edge="right"  zone="center" tag="zone-right-center"  { noop; }
#   Mod+TouchEdge edge="right"  zone="bottom" tag="zone-right-bottom"  { noop; }

# -----------------------------------------------------------------------------
# Top edge — 3 zones (thirds along x)
# -----------------------------------------------------------------------------

[[panel]]
tag = "zone-top-left"
edge = "top"
zone = "start"
size = 260
snap_threshold = 0.4
bg_color = "rgba(230, 80, 80, 0.95)"
label = "Top · Left"

[[panel]]
tag = "zone-top-center"
edge = "top"
zone = "center"
size = 260
snap_threshold = 0.4
bg_color = "rgba(230, 160, 60, 0.95)"
label = "Top · Center"

[[panel]]
tag = "zone-top-right"
edge = "top"
zone = "end"
size = 260
snap_threshold = 0.4
bg_color = "rgba(230, 220, 80, 0.95)"
label = "Top · Right"

# -----------------------------------------------------------------------------
# Bottom edge — 3 zones (thirds along x)
# -----------------------------------------------------------------------------

[[panel]]
tag = "zone-bottom-left"
edge = "bottom"
zone = "start"
size = 260
snap_threshold = 0.4
bg_color = "rgba(80, 200, 120, 0.95)"
label = "Bottom · Left"

[[panel]]
tag = "zone-bottom-center"
edge = "bottom"
zone = "center"
size = 260
snap_threshold = 0.4
bg_color = "rgba(60, 180, 200, 0.95)"
label = "Bottom · Center"

[[panel]]
tag = "zone-bottom-right"
edge = "bottom"
zone = "end"
size = 260
snap_threshold = 0.4
bg_color = "rgba(60, 120, 220, 0.95)"
label = "Bottom · Right"

# -----------------------------------------------------------------------------
# Left edge — 3 zones (thirds along y)
# -----------------------------------------------------------------------------

[[panel]]
tag = "zone-left-top"
edge = "left"
zone = "start"
size = 340
snap_threshold = 0.4
bg_color = "rgba(150, 80, 220, 0.95)"
label = "Left · Top"

[[panel]]
tag = "zone-left-center"
edge = "left"
zone = "center"
size = 340
snap_threshold = 0.4
bg_color = "rgba(200, 80, 200, 0.95)"
label = "Left · Center"

[[panel]]
tag = "zone-left-bottom"
edge = "left"
zone = "end"
size = 340
snap_threshold = 0.4
bg_color = "rgba(220, 80, 150, 0.95)"
label = "Left · Bottom"

# -----------------------------------------------------------------------------
# Right edge — 3 zones (thirds along y)
# -----------------------------------------------------------------------------

[[panel]]
tag = "zone-right-top"
edge = "right"
zone = "start"
size = 340
snap_threshold = 0.4
bg_color = "rgba(80, 220, 200, 0.95)"
label = "Right · Top"

[[panel]]
