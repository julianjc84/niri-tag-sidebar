# niri-tag-sidebar sample configuration
#
# Each [[panel]] defines a slide-out drawer bound to a gesture tag.
# The tag must match a `tag="..."` property on a gesture bind in your niri config.
#
# This sample demonstrates the edge-zone feature — each of niri's four
# touchscreen edges is split into three zones (thirds along the
# perpendicular axis), and every zone gets its own differently-colored
# drawer that occupies only that third of the screen.
#
# Matching niri config (in your binds block):
#
#   TouchEdgeTop:Left      tag="zone-top-left"      { noop; }
#   TouchEdgeTop:Center    tag="zone-top-center"    { noop; }
#   TouchEdgeTop:Right     tag="zone-top-right"     { noop; }
#   TouchEdgeBottom:Left   tag="zone-bottom-left"   { noop; }
#   TouchEdgeBottom:Center tag="zone-bottom-center" { noop; }
#   TouchEdgeBottom:Right  tag="zone-bottom-right"  { noop; }
#   TouchEdgeLeft:Top      tag="zone-left-top"      { noop; }
#   TouchEdgeLeft:Center   tag="zone-left-center"   { noop; }
#   TouchEdgeLeft:Bottom   tag="zone-left-bottom"   { noop; }
#   TouchEdgeRight:Top     tag="zone-right-top"     { noop; }
#   TouchEdgeRight:Center  tag="zone-right-center"  { noop; }
#   TouchEdgeRight:Bottom  tag="zone-right-bottom"  { noop; }
#
# Available settings per panel:
#   tag            - gesture tag to listen for (required)
#   edge           - "left", "right", "top", "bottom" (required)
#   zone           - "full" (default), "start", "center", "end"
#                    For top/bottom: start=left, center=middle, end=right
#                    For left/right: start=top,  center=middle, end=bottom
#   size           - panel size in pixels perpendicular to the edge (default: 300)
#   snap_threshold - 0.0-1.0, progress needed to snap open (default: 0.5)
#   bg_color       - CSS color string (default: "rgba(30, 30, 46, 0.85)")
#   label          - text label shown in the panel (optional)
#   start_open     - true/false (default: false)
#   exclusive_zone - pixels to reserve, 0 = overlay (default: 0)
#   layer          - "overlay" (above bars), "top" (same as bars),
#                    "bottom", "background" (default: "overlay")

# -----------------------------------------------------------------------------
# Top edge — 3 zones (thirds along x)
# -----------------------------------------------------------------------------

[[panel]]
tag = "zone-top-left"
edge = "top"
zone = "start"
size = 260
snap_threshold = 0.4
bg_color = "rgba(230, 80, 80, 0.95)"
label = "Top · Left"

[[panel]]
tag = "zone-top-center"
edge = "top"
zone = "center"
size = 260
snap_threshold = 0.4
bg_color = "rgba(230, 160, 60, 0.95)"
label = "Top · Center"

[[panel]]
tag = "zone-top-right"
edge = "top"
zone = "end"
size = 260
snap_threshold = 0.4
bg_color = "rgba(230, 220, 80, 0.95)"
label = "Top · Right"

